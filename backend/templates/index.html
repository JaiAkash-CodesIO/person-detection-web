<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Person Detection System</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <header>

            <h1>Person Detection System</h1>

            <p>RT-DETR-L Live Camera Monitoring</p>

        </header>

        <!-- Camera Controls -->
        <div class="camera-controls">

            <label for="cameraSelect">Camera Source:</label>

            <select id="cameraSelect">

                <option value="laptop">
                    💻 Laptop Camera
                </option>

                <option value="rtsp">
                    📹 IP Camera (RTSP)
                </option>

            </select>

            <button id="connectBtn">
                Connect
            </button>
            <button id="disconnectBtn">
    Disconnect
</button>

        </div>

        <!-- Camera Card -->
        <div class="camera-card">

            <!-- Status -->
            <div class="status-bar">

    <div class="status-item">

        <div class="status-title">
            Camera
        </div>

        <div class="status-value" id="status">
            🔴 Disconnected
        </div>

    </div>

    <div class="status-item">

        <div class="status-title">
            Persons
        </div>

        <div class="status-value" id="persons">
            0
        </div>

    </div>

    <div class="status-item">

        <div class="status-title">
            FPS
        </div>

        <div class="status-value" id="fps">
            0
        </div>

    </div>

</div>

            <!-- Live Video -->
            <img
                id="video"
                src=""
                alt="Live Camera Feed">

        </div>

    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
